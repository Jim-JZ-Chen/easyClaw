<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyClaw · 产品交付中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6fff;
      --accent2: #ff6f91;
      --accent3: #6fffd4;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --card-hover: #1e1e2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,111,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,111,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(124,111,255,0.12); top: -150px; right: -100px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(111,255,212,0.06); bottom: 100px; left: -100px; }

    /* ── layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ── nav ── */
    nav {
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .nav-badge {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Fira Code', monospace;
    }

    /* ── hero ── */
    .hero {
      padding: 80px 0 60px;
      text-align: center;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,111,255,0.1);
      border: 1px solid rgba(124,111,255,0.25);
      color: var(--accent);
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .hero-tag::before { content: '●'; font-size: 8px; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    h1 span.grad {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    /* ── stats bar ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 0 auto 80px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      max-width: 500px;
      overflow: hidden;
    }
    .stat {
      flex: 1;
      padding: 18px 20px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Fira Code', monospace;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── section ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── empty state ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      border: 1px dashed var(--border);
      border-radius: 20px;
      background: var(--surface);
      margin-bottom: 60px;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
      opacity: 0.6;
    }
    .empty-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .empty-sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 340px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── product cards ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
    }
    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .product-card:hover {
      border-color: rgba(124,111,255,0.4);
      transform: translateY(-3px);
      background: var(--card-hover);
      box-shadow: 0 20px 60px rgba(124,111,255,0.1);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .card-status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 500;
    }
    .status-live { background: rgba(111,255,212,0.1); color: var(--accent3); border: 1px solid rgba(111,255,212,0.2); }
    .status-wip  { background: rgba(255,200,80,0.1);  color: #ffc850;        border: 1px solid rgba(255,200,80,0.2); }

    .card-name { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .card-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .tag {
      font-size: 11px;
      font-family: 'Fira Code', monospace;
      padding: 3px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .card-date { font-size: 12px; color: var(--muted); font-family: 'Fira Code', monospace; }
    .card-link {
      font-size: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }
    .card-link svg { width: 12px; height: 12px; }

    /* ── footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: gap;
    }
    .footer-left { font-size: 13px; color: var(--muted); }
    .footer-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .footer-right a { color: var(--accent); text-decoration: none; }
    .pulse { display: inline-block; width: 8px; height: 8px; background: var(--accent3); border-radius: 50%; animation: blink 2s infinite; }

    /* ── coming soon ribbon ── */
    .ribbon {
      position: absolute;
      top: 14px; right: -22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 30px;
      transform: rotate(35deg);
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .stats { flex-direction: column; max-width: 100%; }
      .stat { border-right: none; border-bottom: 1px solid var(--border); }
      .stat:last-child { border-bottom: none; }
      footer { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <!-- NAV -->
  <nav>
    <div class="logo">
      <div class="logo-icon">🦞</div>
      EasyClaw
    </div>
    <span class="nav-badge">delivery.center / v1.0</span>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-tag">产品交付中心</div>
    <h1>由 AI 构建<br><span class="grad">交付每一个想法</span></h1>
    <p class="hero-sub">这里汇聚了所有由 EasyClaw AI 助手设计、开发并交付的产品。每一个子文件夹都是一个完整的项目。</p>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="count-total">0</div>
      <div class="stat-label">总项目数</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="count-live">0</div>
      <div class="stat-label">已上线</div>
    </div>
    <div class="stat">
      <div class="stat-num">∞</div>
      <div class="stat-label">可能性</div>
    </div>
  </div>

  <!-- PROJECTS SECTION -->
  <div class="section-header">
    <span class="section-title">所有产品</span>
    <div class="section-line"></div>
  </div>

  <!-- 空状态 — 当有产品时删除此块 -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🚀</div>
    <div class="empty-title">第一个产品正在路上…</div>
    <p class="empty-sub">每完成一个项目，它就会出现在这里。<br/>这个页面本身，就是第 0 号交付物。</p>
  </div>

  <!-- 产品卡片区域 — 每次添加新产品时复制一个 .product-card -->
  <div class="products-grid" id="products-grid">
    <!--
    示例卡片（复制并修改以添加新产品）：

    <a class="product-card" href="./project-name/index.html">
      <div class="card-head">
        <div class="card-icon" style="background:rgba(124,111,255,0.15)">🛠️</div>
        <span class="card-status status-live">● Live</span>
      </div>
      <div class="card-name">产品名称</div>
      <div class="card-desc">一句话描述这个产品是做什么的，有什么价值。</div>
      <div class="card-tags">
        <span class="tag">React</span>
        <span class="tag">TypeScript</span>
      </div>
      <div class="card-footer">
        <span class="card-date">2026-03-11</span>
        <span class="card-link">查看项目 →</span>
      </div>
    </a>
    -->
  </div>

  <!-- FOOTER -->
  <footer>
    <span class="footer-left">© 2026 EasyClaw · 产品交付中心</span>
    <div class="footer-right">
      <span class="pulse"></span>
      由 AI 持续构建中 ·
      <a href="https://github.com/Jim-JZ-Chen/easyClaw" target="_blank">GitHub</a>
    </div>
  </footer>
</div>

<script>
  // 统计卡片数量并更新 stats
  const cards = document.querySelectorAll('#products-grid .product-card');
  const liveCards = document.querySelectorAll('.status-live');
  document.getElementById('count-total').textContent = cards.length;
  document.getElementById('count-live').textContent = liveCards.length;
  if (cards.length > 0) {
    document.getElementById('empty-state').style.display = 'none';
  }
</script>
</body>
</html>
